spring.application.name=core-app
server.port = 7803

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.hibernate.ddl-auto=${DATABASE_HIBERNATE_AUTO_UPDATE_PROPERTY}

# Tell Hibernate you're using PostgreSQL (avoids dialect warnings)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Optional but useful: see the actual SQL being fired during dev
spring.jpa.show-sql=true

# JWT related DATA
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# For email verification
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

